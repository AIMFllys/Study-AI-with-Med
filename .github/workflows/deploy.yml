name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 部署到宝塔服务器
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 SSH 连接服务器并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            echo "===== 🚀 开始自动化部署 ====="

            # 修复 Git 权限问题
            git config --global --add safe.directory /www/wwwroot/ai-med.husteread.icu

            # 进入项目目录
            cd /www/wwwroot/ai-med.husteread.icu

            # 强制同步远程代码（丢弃服务器上的本地修改）
            echo "📥 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 清理旧的构建产物（防止缓存残留导致版本回退）
            echo "🧹 清理旧构建..."
            rm -rf .next

            # 彻底清除 PM2 残留进程（避免端口冲突）
            echo "🗑️ 清除 PM2 残留..."
            pm2 delete medicine 2>/dev/null || true
            pm2 save --force 2>/dev/null || true

            # 安装依赖
            echo "📦 安装依赖..."
            npm ci

            # 编译生产版本
            echo "🔨 编译中..."
            npm run build

            # 杀掉占用 3000 端口的所有旧进程
            echo "🔄 释放端口并重启..."
            fuser -k 3000/tcp 2>/dev/null || true
            sleep 2

            # 通过宝塔的 Node 项目管理器重启（它会自动用 next start 启动）
            # 如果宝塔 Node 项目管理器未自动拉起，手动用 pm2 启动
            cd /www/wwwroot/ai-med.husteread.icu
            PORT=3000 pm2 start npm --name "medicine" -- start
            pm2 save

            echo "===== ✅ 部署完成！ ====="
