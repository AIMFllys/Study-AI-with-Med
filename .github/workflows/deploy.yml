name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 部署到宝塔服务器
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 SSH 连接服务器并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            echo "===== 🚀 开始自动化部署 ====="

            # 修复 Git 权限问题
            git config --global --add safe.directory /www/wwwroot/ai-med.husteread.icu

            # 进入项目目录
            cd /www/wwwroot/ai-med.husteread.icu

            # 拉取最新代码
            echo "📥 拉取最新代码..."
            git pull origin main

            # 安装依赖
            echo "📦 安装依赖..."
            npm install

            # 编译生产版本
            echo "🔨 编译中..."
            npm run build

            # 重启宝塔 Node 项目
            echo "🔄 重启服务..."
            /etc/init.d/bt restart_node ai_med_husteread_icu 2>/dev/null || true

            echo "===== ✅ 部署完成！ ====="
