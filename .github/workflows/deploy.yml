name: 🚀 Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: 部署到宝塔服务器
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 SSH 连接服务器并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 10m
          script: |
            echo "===== 🚀 开始自动化部署 ====="

            # 修复 Git 权限问题
            git config --global --add safe.directory /www/wwwroot/ai-med.husteread.icu

            # 进入项目目录
            cd /www/wwwroot/ai-med.husteread.icu

            # 强制同步远程代码（丢弃服务器上的本地修改）
            echo "📥 拉取最新代码..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # 安装依赖
            echo "📦 安装依赖..."
            npm ci

            # 编译生产版本
            echo "🔨 编译中..."
            npm run build

            # 重启 PM2 服务
            echo "🔄 重启服务..."
            if pm2 describe medicine > /dev/null 2>&1; then
              pm2 restart medicine
            else
              pm2 start npm --name "medicine" -- start
            fi
            pm2 save

            echo "===== ✅ 部署完成！ ====="
